<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Orbit.io</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100dvh;
    overflow: hidden;
    font-family: 'Exo 2', sans-serif;
    touch-action: none;
  }
  canvas { display: block; cursor: none; }

  #ui {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  #hud {
    position: absolute;
    top: 16px; left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .hudItem {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 6px 16px;
    color: #fff;
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    letter-spacing: 1px;
  }

  .hudItem span { color: #7ee8fa; }

  #massBar {
    position: absolute;
    bottom: 20px; left: 50%;
    transform: translateX(-50%);
    width: min(300px, 80vw);
  }

  #massBarLabel {
    color: rgba(255,255,255,0.4);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 4px;
  }

  #massBarTrack {
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 3px;
    overflow: hidden;
  }

  #massBarFill {
    height: 100%;
    background: linear-gradient(90deg, #7ee8fa, #a78bfa);
    border-radius: 3px;
    width: 5%;
    transition: width 0.3s ease;
  }

  /* Screens */
  .screen {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    pointer-events: all;
    background: rgba(0,0,5,0.85);
  }
  .screen.hidden { display: none; }

  .screenTitle {
    font-family: 'Orbitron', monospace;
    font-size: clamp(36px, 8vw, 72px);
    font-weight: 900;
    color: #fff;
    letter-spacing: 6px;
    text-shadow: 0 0 30px rgba(126,232,250,0.6), 0 0 60px rgba(126,232,250,0.3);
  }

  .screenTitle span { color: #7ee8fa; }

  .screenSub {
    color: rgba(255,255,255,0.35);
    font-size: clamp(12px, 2.5vw, 15px);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .playBtn {
    pointer-events: all;
    background: transparent;
    border: 1px solid rgba(126,232,250,0.5);
    color: #7ee8fa;
    padding: 14px 48px;
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    letter-spacing: 4px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
    margin-top: 12px;
    transition: all 0.2s;
    box-shadow: 0 0 20px rgba(126,232,250,0.1);
  }
  .playBtn:hover { background: rgba(126,232,250,0.1); box-shadow: 0 0 30px rgba(126,232,250,0.3); }

  .statRow {
    display: flex;
    gap: 20px;
  }

  .statCard {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 12px 28px;
    text-align: center;
  }
  .statCard .sLabel { color: rgba(255,255,255,0.3); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; }
  .statCard .sVal { font-family: 'Orbitron', monospace; font-size: 28px; color: #7ee8fa; margin-top: 4px; }

  #instructions {
    color: rgba(255,255,255,0.25);
    font-size: 12px;
    letter-spacing: 1px;
    text-align: center;
    line-height: 1.8;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="hud" style="display:none">
    <div class="hudItem">MASS <span id="massVal">1</span></div>
    <div class="hudItem">ABSORBED <span id="absorbedVal">0</span></div>
    <div class="hudItem">WAVE <span id="waveVal">1</span></div>
  </div>
  <div id="massBar" style="display:none">
    <div id="massBarLabel">gravity pull</div>
    <div id="massBarTrack"><div id="massBarFill"></div></div>
  </div>

  <!-- Start Screen -->
  <div class="screen" id="startScreen">
    <div class="screenTitle">ORBIT<span>.</span>IO</div>
    <div class="screenSub">gravity is your weapon</div>
    <div id="instructions">
      Move your planet with mouse / finger<br>
      Pull asteroids into your gravity field to grow<br>
      Absorb smaller enemy planets to dominate
    </div>
    <button class="playBtn" id="startBtn">LAUNCH</button>
  </div>

  <!-- Game Over Screen -->
  <div class="screen hidden" id="overScreen">
    <div class="screenTitle" style="font-size:clamp(28px,6vw,52px)">DESTROYED</div>
    <div class="statRow">
      <div class="statCard"><div class="sLabel">Mass</div><div class="sVal" id="finalMass">0</div></div>
      <div class="statCard"><div class="sLabel">Absorbed</div><div class="sVal" id="finalAbsorbed">0</div></div>
    </div>
    <button class="playBtn" id="retryBtn">RETRY</button>
    <button class="playBtn" style="border-color:rgba(255,255,255,0.2);color:rgba(255,255,255,0.4)" id="menuBtn">MENU</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const isMobile = navigator.maxTouchPoints > 1 || /Mobi|Android/i.test(navigator.userAgent);

let W, H;
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Polyfill roundRect for older browsers
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    r = Math.min(r, w/2, h/2);
    this.beginPath();
    this.moveTo(x+r, y);
    this.lineTo(x+w-r, y);
    this.quadraticCurveTo(x+w, y, x+w, y+r);
    this.lineTo(x+w, y+h-r);
    this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    this.lineTo(x+r, y+h);
    this.quadraticCurveTo(x, y+h, x, y+h-r);
    this.lineTo(x, y+r);
    this.quadraticCurveTo(x, y, x+r, y);
    this.closePath();
  };
}

// ── World (larger than screen for scrolling) ──
const WORLD = 2400;

// ── State ──
let state = 'start';
let player = { x: WORLD/2, y: WORLD/2, r: 18, mass: 1, vx:0, vy:0, color:'#7ee8fa', pullRadius:120, alive:false };
let asteroids = [], enemies = [], particles = [], camera = {x: WORLD/2 - W/2, y: WORLD/2 - H/2};
let absorbed = 0, wave = 1, spawnTimer = 0, waveTimer = 0;
let mouseX = W/2, mouseY = H/2;

// Ensure correct initial UI state
document.getElementById('hud').style.display = 'none';
document.getElementById('massBar').style.display = 'none';

// ── Planet colours ──
const PLANET_COLORS = ['#7ee8fa','#a78bfa','#f472b6','#fb923c','#4ade80','#facc15'];
const ENEMY_COLORS  = ['#f87171','#fb923c','#fbbf24','#ef4444'];

function randColor(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

// ── Particles ──
function spawnParticles(x, y, color, count=12) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, life: 1, color, size: 2+Math.random()*3 });
  }
}

// ── Init ──
function initGame() {
  camera = { x: WORLD/2 - W/2, y: WORLD/2 - H/2 };
  player = {
    x: WORLD/2, y: WORLD/2,
    r: 18, mass: 1,
    vx: 0, vy: 0,
    color: '#7ee8fa',
    pullRadius: 120,
    alive: true
  };
  asteroids = [];
  enemies   = [];
  particles = [];
  absorbed  = 0;
  wave      = 1;
  spawnTimer = 0;
  waveTimer  = 0;

  // Spawn initial asteroids
  for (let i = 0; i < 40; i++) spawnAsteroid();
  // Spawn initial enemies
  for (let i = 0; i < 3; i++) spawnEnemy();

  document.getElementById('hud').style.display = 'flex';
  document.getElementById('massBar').style.display = 'block';
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('overScreen').classList.add('hidden');
  state = 'play';
}

function spawnAsteroid() {
  // Spawn away from player
  let x, y;
  do {
    x = Math.random() * WORLD;
    y = Math.random() * WORLD;
  } while (Math.hypot(x - player.x, y - player.y) < 300);

  const size = 4 + Math.random() * 10;
  asteroids.push({
    x, y,
    vx: (Math.random()-0.5)*1.2,
    vy: (Math.random()-0.5)*1.2,
    r: size,
    mass: size * 0.3,
    color: `hsl(${200+Math.random()*60},20%,${50+Math.random()*20}%)`,
    angle: Math.random()*Math.PI*2,
    spin: (Math.random()-0.5)*0.04,
    sides: 5 + Math.floor(Math.random()*4)
  });
}

function spawnEnemy() {
  let x, y;
  do {
    x = 80 + Math.random() * (WORLD-160);
    y = 80 + Math.random() * (WORLD-160);
  } while (Math.hypot(x - player.x, y - player.y) < 400);

  const r = 10 + Math.random() * (player.r * 0.8);
  enemies.push({
    x, y,
    vx: (Math.random()-0.5)*1.5,
    vy: (Math.random()-0.5)*1.5,
    r,
    mass: r * 0.5,
    color: randColor(ENEMY_COLORS),
    pullRadius: r * 5,
    alive: true,
    target: null,
    thinkTimer: 0
  });
}

// ── Input ──
canvas.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  mouseX = e.touches[0].clientX;
  mouseY = e.touches[0].clientY;
}, { passive: false });
canvas.addEventListener('touchstart', e => {
  mouseX = e.touches[0].clientX;
  mouseY = e.touches[0].clientY;
}, { passive: false });

document.getElementById('startBtn').addEventListener('click', initGame);
document.getElementById('retryBtn').addEventListener('click', initGame);
document.getElementById('menuBtn').addEventListener('click', () => {
  state = 'start';
  document.getElementById('hud').style.display = 'none';
  document.getElementById('massBar').style.display = 'none';
  document.getElementById('overScreen').classList.add('hidden');
  document.getElementById('startScreen').classList.remove('hidden');
});

// ── Physics helpers ──
function wrapWorld(obj) {
  if (obj.x < 0) obj.x += WORLD;
  if (obj.x > WORLD) obj.x -= WORLD;
  if (obj.y < 0) obj.y += WORLD;
  if (obj.y > WORLD) obj.y -= WORLD;
}

// ── Update ──
function update() {
  if (state !== 'play' || !player.alive) return;

  // Move player toward mouse (world coords)
  const targetX = camera.x + mouseX;
  const targetY = camera.y + mouseY;
  const dx = targetX - player.x;
  const dy = targetY - player.y;
  const dist = Math.hypot(dx, dy);
  const speed = Math.max(1.2, 5 - player.r * 0.06);
  if (dist > 4) {
    player.vx += (dx/dist) * speed * 0.12;
    player.vy += (dy/dist) * speed * 0.12;
  }
  player.vx *= 0.88;
  player.vy *= 0.88;
  player.x += player.vx;
  player.y += player.vy;
  wrapWorld(player);

  // Camera follows player
  camera.x += (player.x - W/2 - camera.x) * 0.1;
  camera.y += (player.y - H/2 - camera.y) * 0.1;

  player.pullRadius = 80 + player.r * 3;

  // ── Asteroid gravity & collection ──
  for (let i = asteroids.length - 1; i >= 0; i--) {
    const a = asteroids[i];
    a.angle += a.spin;

    // Player gravity pull
    const dx = player.x - a.x;
    const dy = player.y - a.y;
    const d  = Math.hypot(dx, dy);
    if (d < player.pullRadius) {
      const force = (1 - d/player.pullRadius) * 0.6 * (player.mass * 0.4);
      a.vx += (dx/d) * force;
      a.vy += (dy/d) * force;
    }

    // Enemy gravity pull
    for (const e of enemies) {
      if (!e.alive) continue;
      const ex = e.x - a.x, ey = e.y - a.y;
      const ed = Math.hypot(ex, ey);
      if (ed < e.pullRadius) {
        const f = (1 - ed/e.pullRadius) * 0.4;
        a.vx += (ex/ed)*f; a.vy += (ey/ed)*f;
      }
      // Enemy absorbs asteroid
      if (ed < e.r + a.r) {
        e.r    = Math.min(80, e.r + a.r * 0.25);
        e.mass = e.r * 0.5;
        e.pullRadius = e.r * 5;
        spawnParticles(a.x, a.y, a.color, 5);
        asteroids.splice(i, 1);
        break;
      }
    }
    if (i >= asteroids.length) continue;

    a.vx *= 0.995; a.vy *= 0.995;
    a.x += a.vx; a.y += a.vy;
    wrapWorld(a);

    // Player absorbs asteroid
    if (Math.hypot(player.x - a.x, player.y - a.y) < player.r + a.r * 0.5) {
      player.r    = Math.min(120, player.r + a.r * 0.15);
      player.mass = player.r * 0.5;
      spawnParticles(a.x, a.y, a.color, 8);
      asteroids.splice(i, 1);
    }
  }

  // ── Enemy AI ──
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (!e.alive) continue;
    e.thinkTimer++;

    // Simple AI: chase asteroids if small, chase player if bigger
    if (e.thinkTimer % 30 === 0) {
      if (e.r > player.r * 1.1) {
        e.target = 'player';
      } else {
        // Find nearest asteroid
        let best = null, bestD = Infinity;
        for (const a of asteroids) {
          const d = Math.hypot(a.x-e.x, a.y-e.y);
          if (d < bestD) { bestD = d; best = a; }
        }
        e.target = best;
      }
    }

    let tx = e.x, ty = e.y;
    if (e.target === 'player') { tx = player.x; ty = player.y; }
    else if (e.target && asteroids.includes(e.target)) { tx = e.target.x; ty = e.target.y; }

    const edx = tx - e.x, edy = ty - e.y;
    const ed  = Math.hypot(edx, edy);
    const espeed = Math.max(0.8, 3 - e.r * 0.02);
    if (ed > 5) {
      e.vx += (edx/ed)*espeed*0.08;
      e.vy += (edy/ed)*espeed*0.08;
    }
    e.vx *= 0.9; e.vy *= 0.9;
    e.x += e.vx; e.y += e.vy;
    wrapWorld(e);

    // Enemy vs Player collision
    const pd = Math.hypot(player.x-e.x, player.y-e.y);
    if (pd < player.r + e.r) {
      if (player.r > e.r * 1.05) {
        // Player absorbs enemy
        player.r    = Math.min(120, player.r + e.r * 0.4);
        player.mass = player.r * 0.5;
        absorbed++;
        spawnParticles(e.x, e.y, e.color, 20);
        enemies.splice(i, 1);
      } else if (e.r > player.r * 1.05) {
        // Enemy absorbs player
        spawnParticles(player.x, player.y, player.color, 30);
        player.alive = false;
        setTimeout(showGameOver, 800);
        return;
      }
    }
  }

  // ── Spawn management ──
  spawnTimer++;
  waveTimer++;
  if (asteroids.length < 30 + wave * 5) spawnAsteroid();
  if (enemies.length < 2 + wave && spawnTimer > 180) { spawnEnemy(); spawnTimer = 0; }
  if (waveTimer > 1200) { wave++; waveTimer = 0; for (let i=0;i<2;i++) spawnEnemy(); }

  // ── Particles ──
  for (let i = particles.length-1; i>=0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.94; p.vy *= 0.94;
    p.life -= 0.03;
    if (p.life <= 0) particles.splice(i,1);
  }

  // ── HUD ──
  document.getElementById('massVal').textContent = Math.floor(player.mass * 10);
  document.getElementById('absorbedVal').textContent = absorbed;
  document.getElementById('waveVal').textContent = wave;
  const pct = Math.min(100, (player.r - 18) / 102 * 100);
  document.getElementById('massBarFill').style.width = Math.max(5, pct) + '%';
}

function showGameOver() {
  state = 'dead';
  document.getElementById('hud').style.display = 'none';
  document.getElementById('massBar').style.display = 'none';
  document.getElementById('finalMass').textContent = Math.floor(player.mass * 10);
  document.getElementById('finalAbsorbed').textContent = absorbed;
  document.getElementById('overScreen').classList.remove('hidden');
}

// ── Draw ──
function toScreen(wx, wy) {
  return { sx: wx - camera.x, sy: wy - camera.y };
}

// Draw wrapping objects (handles wrap-around)
function drawWrapped(fn, wx, wy, r) {
  const offsets = [-WORLD, 0, WORLD];
  for (const ox of offsets) for (const oy of offsets) {
    const sx = wx + ox - camera.x;
    const sy = wy + oy - camera.y;
    if (sx > -r-10 && sx < W+r+10 && sy > -r-10 && sy < H+r+10) fn(sx, sy);
  }
}

function drawStars(stars) {
  ctx.fillStyle = '#fff';
  for (const s of stars) {
    const sx = ((s.x - camera.x * s.d) % W + W) % W;
    const sy = ((s.y - camera.y * s.d) % H + H) % H;
    ctx.globalAlpha = s.a;
    ctx.fillRect(sx, sy, s.size, s.size);
  }
  ctx.globalAlpha = 1;
}

function drawAsteroid(sx, sy, a) {
  ctx.save();
  ctx.translate(sx, sy);
  ctx.rotate(a.angle);
  ctx.beginPath();
  for (let i = 0; i < a.sides; i++) {
    const ang = (i/a.sides)*Math.PI*2;
    const jitter = a.r * (0.75 + 0.25 * Math.sin(i * 2.3));
    const x = Math.cos(ang)*jitter, y = Math.sin(ang)*jitter;
    i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.fillStyle = a.color;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.restore();
}

function drawPlanet(sx, sy, planet, isPlayer) {
  ctx.save();
  ctx.translate(sx, sy);

  // Gravity ring
  if (isPlayer) {
    const grad = ctx.createRadialGradient(0,0,planet.r,0,0,planet.pullRadius);
    grad.addColorStop(0, `${planet.color}22`);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(0,0,planet.pullRadius,0,Math.PI*2); ctx.fill();

    // Ring outline
    ctx.beginPath(); ctx.arc(0,0,planet.pullRadius,0,Math.PI*2);
    ctx.strokeStyle = `${planet.color}33`; ctx.lineWidth = 1; ctx.stroke();
  }

  // Glow
  ctx.shadowBlur = isPlayer ? 24 : 12;
  ctx.shadowColor = planet.color;

  // Planet body
  const grad2 = ctx.createRadialGradient(-planet.r*0.3,-planet.r*0.3,0,0,0,planet.r);
  grad2.addColorStop(0, lighten(planet.color));
  grad2.addColorStop(1, darken(planet.color));
  ctx.fillStyle = grad2;
  ctx.beginPath(); ctx.arc(0,0,planet.r,0,Math.PI*2); ctx.fill();

  // Atmosphere
  ctx.shadowBlur = 0;
  const atm = ctx.createRadialGradient(0,0,planet.r*0.8,0,0,planet.r*1.15);
  atm.addColorStop(0,'transparent');
  atm.addColorStop(1,`${planet.color}44`);
  ctx.fillStyle = atm;
  ctx.beginPath(); ctx.arc(0,0,planet.r*1.15,0,Math.PI*2); ctx.fill();

  ctx.restore();
}

function lighten(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,r+60)},${Math.min(255,g+60)},${Math.min(255,b+60)})`;
}
function darken(hex) {
  try {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgb(${Math.max(0,r-40)},${Math.max(0,g-40)},${Math.max(0,b-40)})`;
  } catch { return hex; }
}

// Pre-generate stars
const stars = [];
for (let i = 0; i < 200; i++) {
  stars.push({ x: Math.random()*W*3, y: Math.random()*H*3, d: 0.1+Math.random()*0.4, a: 0.2+Math.random()*0.7, size: Math.random()<0.9?1:2 });
}

// Nebula blobs (static bg)
const nebulae = [];
for (let i = 0; i < 6; i++) {
  nebulae.push({ x: Math.random()*WORLD, y: Math.random()*WORLD, r: 200+Math.random()*300, color: ['#7ee8fa','#a78bfa','#f472b6'][Math.floor(Math.random()*3)] });
}

function draw() {
  // Background
  ctx.fillStyle = '#020408';
  ctx.fillRect(0, 0, W, H);

  // Nebulae
  for (const n of nebulae) {
    const sx = n.x - camera.x, sy = n.y - camera.y;
    const grad = ctx.createRadialGradient(sx,sy,0,sx,sy,n.r);
    grad.addColorStop(0, n.color+'08');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(sx,sy,n.r,0,Math.PI*2); ctx.fill();
  }

  // Stars (parallax)
  drawStars(stars);

  if (state !== 'play' && state !== 'dead') return;

  // Grid lines (subtle)
  ctx.strokeStyle = 'rgba(255,255,255,0.025)';
  ctx.lineWidth = 1;
  const gridSize = 120;
  const offX = camera.x % gridSize, offY = camera.y % gridSize;
  for (let x = -offX; x < W; x += gridSize) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = -offY; y < H; y += gridSize) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // Asteroids
  for (const a of asteroids) {
    drawWrapped((sx,sy) => drawAsteroid(sx,sy,a), a.x, a.y, a.r);
  }

  // Enemies
  for (const e of enemies) {
    if (!e.alive) continue;
    drawWrapped((sx,sy) => drawPlanet(sx,sy,e,false), e.x, e.y, e.r*1.2);
  }

  // Player
  if (player.alive) {
    drawWrapped((sx,sy) => drawPlanet(sx,sy,player,true), player.x, player.y, player.pullRadius);
  }

  // Particles
  for (const p of particles) {
    const sx = p.x - camera.x, sy = p.y - camera.y;
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(sx,sy,p.size,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Minimap
  drawMinimap();
}

function drawMinimap() {
  const mw = 110, mh = 110, mx = W - mw - 12, my = H - mh - 12;
  const scale = mw / WORLD;

  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(mx,my,mw,mh,6); ctx.fill(); ctx.stroke();

  // Asteroids
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  for (const a of asteroids) {
    ctx.beginPath(); ctx.arc(mx+a.x*scale, my+a.y*scale, 1.5, 0, Math.PI*2); ctx.fill();
  }

  // Enemies
  for (const e of enemies) {
    ctx.fillStyle = e.color + 'cc';
    ctx.beginPath(); ctx.arc(mx+e.x*scale, my+e.y*scale, 3, 0, Math.PI*2); ctx.fill();
  }

  // Player
  if (player.alive) {
    ctx.fillStyle = player.color;
    ctx.shadowBlur = 6; ctx.shadowColor = player.color;
    ctx.beginPath(); ctx.arc(mx+player.x*scale, my+player.y*scale, 4, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Camera viewport rect
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.strokeRect(mx+camera.x*scale, my+camera.y*scale, W*scale, H*scale);
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
